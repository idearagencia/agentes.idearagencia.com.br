<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentOS — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
 --bg: #141414;
 --card-bg: #1a1a1a;
 --card-border: #333;
 --text-main: #ffffff;
 --text-sec: #A5A5A5;
 --primary: #EC1D3A;
 --accent: #00d4ff;
 --success: #00ff88;
 --warning: #ffaa00;
 --danger: #ff4444;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
 font-family: Inter, -apple-system, sans-serif;
 background: var(--bg);
 color: var(--text-main);
 min-height: 100vh;
 display: flex;
 align-items: center;
 justify-content: center;
}
.login-container {
 background: var(--card-bg);
 border: 1px solid var(--card-border);
 border-radius: 16px;
 padding: 3rem;
 width: 100%;
 max-width: 420px;
 box-shadow: 0 20px 60px rgba(0,0,0,0.5);
 animation: fadeIn 0.5s ease backwards;
}
@keyframes fadeIn {
 from { opacity: 0; transform: translateY(20px); }
 to { opacity: 1; transform: translateY(0); }
}
.logo {
 text-align: center;
 margin-bottom: 2rem;
}
.logo img {
 width: 200px;
 height: auto;
 margin-bottom: 0.25rem;
}
.logo h1 {
 font-size: 1.8rem;
 font-weight: 800;
 letter-spacing: 1px;
 color: var(--text-main);
 margin: 0;
}
.logo p {
 color: var(--text-sec);
 font-size: 0.85rem;
 margin-top: 0.5rem;
}
.form-group {
 margin-bottom: 1.5rem;
}
label {
 display: block;
 margin-bottom: 0.5rem;
 color: var(--text-sec);
 font-size: 0.85rem;
 font-weight: 500;
 text-transform: uppercase;
 letter-spacing: 0.5px;
}
input {
 width: 100%;
 padding: 0.875rem 1rem;
 background: rgba(255,255,255,0.05);
 border: 1px solid var(--card-border);
 border-radius: 8px;
 color: var(--text-main);
 font-size: 1rem;
 transition: border-color 0.2s, box-shadow 0.2s;
 font-family: Inter, -apple-system, sans-serif;
}
input:focus {
 outline: none;
 border-color: var(--primary);
 box-shadow: 0 0 0 3px rgba(236,29,58,0.15);
}
input::placeholder {
 color: var(--text-sec);
 opacity: 0.6;
}
.btn-login {
 width: 100%;
 padding: 1rem;
 background: var(--primary);
 border: none;
 border-radius: 10px;
 color: white;
 font-size: 1rem;
 font-weight: 700;
 cursor: pointer;
 transition: all 0.2s ease;
 box-shadow: 0 4px 12px rgba(236,29,58,0.25);
 margin-bottom: 1rem;
}
.btn-login:hover {
 background: #ff2540;
 transform: translateY(-2px);
 box-shadow: 0 6px 16px rgba(236,29,58,0.4);
}
.btn-login:active {
 transform: translateY(0);
}
.btn-login:disabled {
 opacity: 0.6;
 cursor: not-allowed;
 transform: none;
}
.error-message {
 background: rgba(255, 68, 68, 0.15);
 border: 1px solid rgba(255, 68, 68, 0.3);
 border-radius: 8px;
 padding: 1rem;
 margin-bottom: 1.5rem;
 color: var(--danger);
 font-size: 0.9rem;
 display: none;
}
.error-message.visible {
 display: block;
}
.spinner {
 display: none;
 width: 20px;
 height: 20px;
 border: 3px solid rgba(255, 255, 255, 0.3);
 border-radius: 50%;
 border-top-color: #fff;
 animation: spin 1s ease-in-out infinite;
 margin: 0 auto;
}
@keyframes spin {
 to { transform: rotate(360deg); }
}
.btn-login.loading .btn-text {
 display: none;
}
.btn-login.loading .spinner {
 display: block;
}
.footer {
 text-align: center;
 margin-top: 2rem;
 color: var(--text-sec);
 font-size: 0.8rem;
 line-height: 1.6;
}
.footer-logo {
 width: 120px;
 height: auto;
 margin: 1rem auto 0.5rem;
 display: block;
 opacity: 0.9;
}
.footer a { color: var(--primary); text-decoration: none; }
.footer a:hover { text-decoration: underline; }
@media (max-width: 480px) {
 .login-container {
  padding: 2rem;
  margin: 1rem;
  max-width: 100%;
 }
 .logo img {
  width: 150px;
 }
 .footer-logo {
  width: 60px;
 }
}
</style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <!-- Avatar Robot AgentOS -->
      <svg width="80" height="80" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="margin-bottom: 1rem;">
        <defs>
          <linearGradient id="robotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#EC1D3A"/>
            <stop offset="100%" style="stop-color:#8B0000"/>
          </linearGradient>
        </defs>
        <!-- Cabeça robótica -->
        <rect x="25" y="15" width="50" height="35" rx="8" fill="url(#robotGrad)"/>
        <!-- Antena -->
        <rect x="48" y="4" width="4" height="12" fill="#333"/>
        <rect x="46" y="2" width="8" height="4" rx="2" fill="#ff4444"/>
        <!-- Olhos com expressão -->
        <rect x="32" y="23" width="12" height="6" rx="3" fill="#0a0a0a"/>
        <rect x="56" y="23" width="12" height="6" rx="3" fill="#0a0a0a"/>
        <circle cx="38" cy="26" r="2" fill="#ffffff"/>
        <circle cx="62" cy="26" r="2" fill="#ffffff"/>
        <!-- Boca leve sorriso -->
        <rect x="43" y="33" width="14" height="2" rx="1" fill="#0a0a0a"/>
        <!-- Corpo -->
        <rect x="30" y="50" width="40" height="18" rx="6" fill="url(#robotGrad)"/>
        <!-- Botões de controle -->
        <circle cx="40" cy="59" r="2" fill="#00ff88"/>
        <circle cx="50" cy="59" r="2" fill="#ffaa00"/>
        <circle cx="60" cy="59" r="2" fill="#ff4444"/>
        <!-- Braços -->
        <rect x="20" y="52" width="10" height="6" rx="3" fill="#333"/>
        <rect x="70" y="52" width="10" height="6" rx="3" fill="#333"/>
      </svg>
      <h1>AgentOS</h1>
      <p>Sistema de Gestão de Agentes Inteligentes</p>
    </div>
    
    <div id="error-message" class="error-message">
      Senha incorreta. Tente novamente.
    </div>
    
    <form id="login-form">
      <div class="form-group">
        <label for="username">Usuário</label>
        <input type="text" id="username" name="username" placeholder="Digite seu usuário" required autocomplete="username">
      </div>
      
      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" placeholder="Digite sua senha" required autocomplete="current-password">
      </div>
      
      <button type="submit" class="btn-login" id="login-btn">
        <span class="btn-text">Entrar</span>
        <div class="spinner"></div>
      </button>
    </form>
    
    <div class="footer">
      <img src="https://diegohacks.com.br/wp-content/uploads/2023/05/diegohacks-site.png" alt="DiegoHacks" class="footer-logo">
      <p>© 2026 DiegoHacks — Criado por agentes inteligentes automatizados</p>
    </div>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const errorDiv = document.getElementById('error-message');
    const loginBtn = document.getElementById('login-btn');
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      
      if (!username || !password) {
        showError('Preencha todos os campos');
        return;
      }
      
      loginBtn.classList.add('loading');
      loginBtn.disabled = true;
      hideError();
      
      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ username, password }),
          credentials: 'include'
        });
        
        const data = await response.json();
        
        if (response.ok && data.success) {
          window.location.href = '/';
        } else {
          showError(data.message || 'Falha no login');
        }
      } catch (error) {
        showError('Erro de conexão. Tente novamente.');
        console.error('Login error:', error);
      } finally {
        loginBtn.classList.remove('loading');
        loginBtn.disabled = false;
      }
    });
    
    function showError(message) {
      errorDiv.textContent = message;
      errorDiv.classList.add('visible');
    }
    
    function hideError() {
      errorDiv.classList.remove('visible');
    }
    
    document.getElementById('username').addEventListener('input', hideError);
    document.getElementById('password').addEventListener('input', hideError);
    document.getElementById('username').focus();
  </script>
</body>
</html>
