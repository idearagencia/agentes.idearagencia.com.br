  <style>
    :root{--bg:#141414;--card:#1a1a1a;--border:#333;--text:#fff;--muted:#A5A5A5;--accent:#00d4ff;--success:#00ff88;--warning:#ffaa00;--danger:#ff4444}
    *{margin:0;padding:0;box-sizing:border-box} body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);min-height:100vh} .header{background:linear-gradient(180deg,#1a1a1a,#141414);border-bottom:1px solid var(--border);padding:20px 24px;display:flex;align-items:center;gap:16px} .logo{width:48px;height:48px;background:var(--success);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px} .title h1{font-size:20px;font-weight:800} .title p{font-size:12px;color:var(--muted);margin-top:4px} .container{max-width:1200px;margin:0 auto;padding:24px} .back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;margin-bottom:16px} .back:hover{color:var(--primary)} .alert{padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:12px} .empty{padding:40px;text-align:center;color:var(--muted)}
  </style>
</head>
