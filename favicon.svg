<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Robô preto estilo DiegoHacks -->
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Cabeça -->
  <rect x="16" y="12" width="32" height="24" rx="6" fill="url(#bodyGrad)" filter="url(#shadow)"/>
  
  <!-- Olhos (brilho verde) -->
  <circle cx="24" cy="22" r="4" fill="#00ff88"/>
  <circle cx="40" cy="22" r="4" fill="#00ff88"/>
  <circle cx="25" cy="21" r="1.5" fill="#ffffff" opacity="0.8"/>
  <circle cx="41" cy="21" r="1.5" fill="#ffffff" opacity="0.8"/>
  
  <!-- Antenas -->
  <line x1="32" y1="12" x2="32" y2="4" stroke="url(#bodyGrad)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="32" cy="3" r="3" fill="#00ff88"/>
  
  <!-- Corpo -->
  <rect x="14" y="36" width="36" height="20" rx="4" fill="url(#bodyGrad)" filter="url(#shadow)"/>
  
  <!-- Detalhes do corpo (linhas) -->
  <line x1="22" y1="44" x2="26" y2="44" stroke="#00ff88" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="44" x2="38" y2="44" stroke="#00ff88" stroke-width="2" stroke-linecap="round"/>
  <line x1="42" y1="44" x2="46" y2="44" stroke="#00ff88" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Base/rodape -->
  <rect x="10" y="56" width="44" height="4" rx="2" fill="#333333"/>
</svg>